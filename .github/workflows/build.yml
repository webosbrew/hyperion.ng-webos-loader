name: WebOS-Build (Qt6)
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/openlgtv/buildroot-nc4/releases/download/webos-b17b4cc/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  BUILD_DIR: build
  QT_VERSION: "6.8.3"

jobs:
  build_hyperion_ng:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hyperion.ng
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          ref: 2.2.1
          path: hyperion.ng
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt update
          sudo apt install -y ccache git cmake build-essential flatbuffers-compiler ninja-build wget libdbus-1-dev
      - name: Set up Environment
        run: |        
          echo "QT_TOOLCHAIN_DIR=${{ env.TOOLCHAIN_DIR }}/qt6-host" >> $GITHUB_ENV
          echo "SYSROOT=${{ env.TOOLCHAIN_DIR }}/arm-webos-linux-gnueabi/sysroot" >> $GITHUB_ENV
      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-qt-${{ env.QT_VERSION }}

      - name: Download and unpack toolchain      
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          sudo chown $USER /opt
          wget -q -O toolchain.tar.gz ${{ env.TOOLCHAIN_URL }}
          tar xf toolchain.tar.gz -C /opt
          cd ${{ env.TOOLCHAIN_DIR }}
          ./relocate-sdk.sh
      - name: "Build QT6 (Host & Cross)"
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/qt_build ${{ env.QT_TOOLCHAIN_DIR }}
          sudo chown -R $USER:$USER /opt/qt_build ${{ env.QT_TOOLCHAIN_DIR }}
          git clone --branch v${QT_VERSION} --depth 1 https://github.com/qt/qtbase.git /opt/qt_build/qt_source
          
          # 1. Host Build
          mkdir -p /opt/qt_build/host && cd /opt/qt_build/host
          cmake /opt/qt_build/qt_source -DCMAKE_INSTALL_PREFIX=${{ env.QT_TOOLCHAIN_DIR }} -DCMAKE_BUILD_TYPE=Release -DQT_FEATURE_gui=OFF -DQT_FEATURE_opengl=OFF -DQT_FEATURE_dbus=ON -DQT_BUILD_TESTS=OFF -DFEATURE_icu=OFF -DQT_BUILD_EXAMPLES=OFF -GNinja
          ninja install
          # 2. Preparation & Patches
          cd /opt/qt_build/qt_source
          mkdir -p mkspecs/devices/linux-webos-g++
          cp -r ${{ env.TOOLCHAIN_DIR }}/mkspecs/devices/linux-buildroot-g++ mkspecs/devices/linux-webos-g++
          sed -i '1i#define EM_AARCH64 183' src/corelib/plugin/qelfparser_p.cpp
          sed -i 's/readOnly = (statfs_buf.f_flags \& ST_RDONLY) != 0;/readOnly = false;/' src/corelib/io/qstorageinfo_linux.cpp
                    
          # 3. Cross Build
          mkdir -p /opt/qt_build/base_cross && cd /opt/qt_build/base_cross
          cmake /opt/qt_build/qt_source -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} -DQT_HOST_PATH=${{ env.QT_TOOLCHAIN_DIR }} -DCMAKE_INSTALL_PREFIX=/usr/local/qt6 -DCMAKE_STAGING_PREFIX=${{ env.SYSROOT }}/usr/local/qt6 -DCMAKE_BUILD_TYPE=Release -DQT_FEATURE_dbus=ON -DQT_FEATURE_gui=ON -DQT_FEATURE_widgets=ON -DQT_FEATURE_opengl=OFF -DFEATURE_icu=OFF -GNinja -DQt6CoreTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6CoreTools -DQt6DBusTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6DBusTools -DQt6WidgetsTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6WidgetsTools -DQt6GuiTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6GuiTools
          ninja install
          # --- 4. ADD-ON MODULES ---
          for mod in qtserialport qtwebsockets qtimageformats; do
            echo "Building module: $mod"
            
            # CORRECTION: Use the /qt/ path and the important $ sign before {mod}
            git clone --branch "v${QT_VERSION}" --depth 1 "https://github.com/qt/${mod}.git" "/opt/qt_build/${mod}"
            
            mkdir -p "/opt/qt_build/${mod}/build" && cd "/opt/qt_build/${mod}/build"
            
            cmake .. \
              -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}" \
              -DQT_HOST_PATH="${{ env.QT_TOOLCHAIN_DIR }}" \
              -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" \
              -DCMAKE_INSTALL_PREFIX="/usr/local/qt6" \
              -DCMAKE_STAGING_PREFIX="${{ env.SYSROOT }}/usr/local/qt6" \
              -DINPUT_openssl=runtime \
              -DQT_FEATURE_ssl=ON \
              -GNinja
            ninja install
          done
      - name: Build Hyperion
        env:
          CCACHE_DIR: ${{ github.workspace }}/${{ env.CCACHE_DIR }}
        run: |
          # Change to the directory where Hyperion was cloned
          cd hyperion.ng
          mkdir -p "${{ env.BUILD_DIR }}"
          cd "${{ env.BUILD_DIR }}"
          
          cmake .. \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}" \
            -DQT_HOST_PATH="${{ env.QT_TOOLCHAIN_DIR }}" \
            -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" \
            -DPython3_EXECUTABLE="${{ env.TOOLCHAIN_DIR }}/bin/python3" \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=rpi \
            -DENABLE_CEC=OFF \
            -DENABLE_DEV_FTDI=ON \
            -DHYPERION_LIGHT=ON \
            -DENABLE_REMOTE_CTL=ON \
            -DENABLE_AUDIO=OFF \
            -DENABLE_EFFECTENGINE=ON \
            -DENABLE_JSONCHECKS=ON \
            -DENABLE_DEV_SERIAL=ON \
            -DENABLE_DEV_USB_HID=ON \
            -DENABLE_DEV_TINKERFORGE=ON \
            -DENABLE_MDNS=ON \
            -DENABLE_DEPLOY_DEPENDENCIES=OFF \
            -DENABLE_BOBLIGHT_SERVER=ON \
            -DENABLE_FLATBUF_SERVER=ON \
            -DENABLE_PROTOBUF_SERVER=OFF \
            -DENABLE_FORWARDER=ON \
            -DENABLE_FLATBUF_CONNECT=ON \
            -G Ninja
          ninja
      - name: Copy built binaries and dependencies to release/
        env:
          dependency_libs: >-
            libpython3.10.so.1.0 libpng16.so.16 libjpeg.so.8 libcrypt.so.1 libcrypto.so.1.1 libbz2.so.1
            libz.so.1 libssl.so.1.1 libpcre2-16.so.0 libusb-1.0.so.0 libftdi1.so.2 libudev.so.1 libxkbcommon.so.0
            libfontconfig.so.1 libglib-2.0.so.0 libfreetype.so.6 libz.so.1 libgthread-2.0.so.0 libgcc_s.so.1
          gcc_runtime_libs: >-
            libstdc++.so.6 libatomic.so.1
          qt6_libs: >-
            libQt6Gui.so.6 libQt6Network.so.6 libQt6Widgets.so.6 libQt6Core.so.6 libQt6Sql.so.6 libQt6SerialPort.so.6 libQt6WebSockets.so.6 libQt6DBus.so.6
            
        run: |
          rm -rf ./release
          # Erstelle alle notwendigen Ordnerstrukturen
          mkdir -p ./release/python/lib/python3.10
          mkdir -p ./release/sqldrivers
          mkdir -p ./release/imageformats
          mkdir -p ./release/tls
          
          # 1. Copy Hyperion Binaries
          cp -r -T -- "./hyperion.ng/${{ env.BUILD_DIR }}/bin" ./release
          
          # 2. Collect libraries from Sysroot/Toolchain
          for i in ${{ env.dependency_libs }}; do
            find "${{ env.SYSROOT }}/usr/lib/" "${{ env.SYSROOT }}/lib/" -name "${i}" -exec cp -L {} ./release/ \; 2>/dev/null | head -1
          done
          for i in ${{ env.gcc_runtime_libs }}; do
            find "${{ env.TOOLCHAIN_DIR }}/arm-webos-linux-gnueabi/lib/" -name "${i}" -exec cp -L {} ./release/ \; 2>/dev/null | head -1
          done
          for i in ${{ env.qt6_libs }}; do
            find "${{ env.SYSROOT }}/usr/local/qt6/lib/" -name "${i}" -exec cp -L {} ./release/ \; 2>/dev/null | head -1
          done
          # 3. Copy Qt6 Plugins (IMPORTANT!)
          echo "Copying Qt6 Plugins..."
          cp -L "${{ env.SYSROOT }}/usr/local/qt6/plugins/sqldrivers/"*.so ./release/sqldrivers/ 2>/dev/null || true
          cp -L "${{ env.SYSROOT }}/usr/local/qt6/plugins/imageformats/"*.so ./release/imageformats/ 2>/dev/null || true
          cp -L "${{ env.SYSROOT }}/usr/local/qt6/plugins/tls/"*.so ./release/tls/ 2>/dev/null || true
          # 4. Python Standard Library Struktur kopieren
          echo "Copying Python Libs..."
          cp -r "${{ env.SYSROOT }}/usr/lib/python3.10/"* ./release/python/lib/python3.10/
          # 5. Stripping - Space savings (approx. 70%)
          echo "Stripping binaries..."
          STRIP="${{ env.TOOLCHAIN_DIR }}/bin/arm-webos-linux-gnueabi-strip"
          $STRIP ./release/hyperiond || true
          find ./release -maxdepth 1 -name "*.so*" -exec $STRIP --strip-unneeded {} + || true
          find ./release/python/lib/python3.10/lib-dynload -name "*.so" -exec $STRIP --strip-unneeded {} + || true
          find ./release/sqldrivers -name "*.so" -exec $STRIP --strip-unneeded {} + || true
          find ./release/imageformats -name "*.so" -exec $STRIP --strip-unneeded {} + || true
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-webos-binaries
          path: ./release/


  build_ipk:
    runs-on: ubuntu-latest
    needs: build_hyperion_ng
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: hyperion.ng-webos-binaries
          path: hyperion.ng-build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14.x
      - name: Restore toolchain cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-qt-${{ env.QT_VERSION }}
      - name: Install native dependencies
        run: sudo apt update && sudo apt install -y cmake build-essential
      - run: npm install
      - run: npm run build -- --env production
      - name: Build service
        run: |
          mkdir -p ./service/build && cd ./service/build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}"
          make && cd ../..
          mkdir -p ./dist && rm -rf ./dist/service && cp -r -T -- ./service/build/dist ./dist/service
      - name: Copy hyperion.ng into dist/service/hyperion
        run: |
          rm -rf ./dist/service/hyperion && mkdir -p ./dist/service/hyperion
          cp -r -T ./hyperion.ng-build ./dist/service/hyperion
          rm -f ./dist/service/hyperion/flatc
      - name: Ensure executables +x
        run: |
          chmod +x ./dist/service/autostart.sh ./dist/service/loader_service ./dist/service/start_hyperiond
          chmod +x ./dist/service/hyperion/hyperiond ./dist/service/hyperion/hyperion-remote
          chmod -R +r ./dist/service/hyperion
      - run: npm run package
      - run: npm run gen-manifest
      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-ipk
          path: ${{ github.workspace }}/*.ipk

      - uses: marvinpinto/action-automatic-releases@latest
        if: "github.ref == 'refs/heads/master'"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: latest
          prerelease: true
          title: "Development Build (Qt6)"
          files: |
            ${{ github.workspace }}/*.ipk
            ${{ github.workspace }}/org.webosbrew.hyperion.ng.loader.manifest.json
